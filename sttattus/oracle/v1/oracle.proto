syntax = "proto3";

package sttattus.oracle.v1;

option go_package = "github.com/sttattus/proto/gen/go/sttattus/oracle/v1;oraclev1";

message QueryRequest {
  string prompt = 1;
}

message QueryResponse {
  string response = 1;
  double confidence = 2;
}

service OracleService {
  rpc Query(QueryRequest) returns (QueryResponse);
}
