syntax = "proto3";

package sttattus.legacy.v1;

option go_package = "github.com/sttattus/proto/gen/go/sttattus/legacy/v1;legacyv1";

message Document {
  string id = 1;
  string title = 2;
  string content_hash = 3;
}

message StoreDocumentRequest {
  string title = 1;
  bytes encrypted_blob = 2;
}

message StoreDocumentResponse {
  string id = 1;
}

service LegacyService {
  rpc StoreDocument(StoreDocumentRequest) returns (StoreDocumentResponse);
}
