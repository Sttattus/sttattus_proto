syntax = "proto3";

package sttattus.scoring.v1;

option go_package = "github.com/sttattus/proto/gen/go/sttattus/scoring/v1;scoringv1";

// Rust scoring service. Called by Go to compute deltas during writes —
// LogDayWorkout / UpdateProgress / Swipe all hit this service so Rust is
// visibly involved in the user's normal flow.

message WorkoutSeriesInput {
  int32 set_index = 1;
  double weight = 2;
  int32 reps = 3;
  string unit = 4;
}

message ScoreWorkoutRequest {
  string user_id = 1;
  repeated WorkoutSeriesInput series = 2;
  // Existing forge stats so the service can decide whether the user is
  // setting a new PR.
  int32 current_power = 3;
  int32 current_agility = 4;
  int32 current_grit = 5;
}
message ScoreWorkoutResponse {
  int64 experience_delta = 1;
  int32 power_delta = 2;
  int32 agility_delta = 3;
  int32 grit_delta = 4;
}

message ScoreLexicalProgressRequest {
  string user_id = 1;
  string word_id = 2;
  int32 score_delta = 3;
  bool mastered = 4;
  int32 current_eloquence = 5;
  int32 current_lexical_depth = 6;
}
message ScoreLexicalProgressResponse {
  int32 eloquence_delta = 1;
  int32 lexical_depth_delta = 2;
}

message ScoreMatchRequest {
  string swiper_user_id = 1;
  string target_user_id = 2;
  
  // Swiper 12-Factor Profile
  double swiper_vault_rank = 3;
  double swiper_apex_rank = 4;
  double swiper_forge_rank = 5;
  int32 swiper_intellectual_pace = 6;
  int32 swiper_emotional_granularity = 7;
  int32 swiper_physical_drive = 8;
  int32 swiper_social_battery = 9;

  // Target 12-Factor Profile
  double target_vault_rank = 10;
  double target_apex_rank = 11;
  double target_forge_rank = 12;
  int32 target_intellectual_pace = 13;
  int32 target_emotional_granularity = 14;
  int32 target_physical_drive = 15;
  int32 target_social_battery = 16;
}
message ScoreMatchResponse {
  double compatibility = 1; // 0.0 - 1.0
  double tension_baseline = 2;
}

message ScoreEmpireRequest {
  string user_id = 1;
  // All 12 raw metrics
  double forge_exp = 2;
  double lexicon_eloquence = 3;
  double nomad_exploration = 4;
  double atlas_behavioral = 5;
  double vault_wealth = 6;
  double apex_biomarkers = 7;
  double oracle_intelligence = 8;
  double dominion_estate = 9;
  double legacy_heritage = 10;
  double zenith_focus = 11;
  double onyx_exclusivity = 12;
  double empire_reputation = 13;
}
message ScoreEmpireResponse {
  double sttattus_score = 1;
  string recommended_tier = 2;
}

message ApplyDecayRequest {
  double current_score = 1;
  double decay_rate = 2;
  int32 days_inactive = 3;
}
message ApplyDecayResponse {
  double decayed_score = 1;
}

message ScoreForgeRequest {
  string user_id = 1;
  repeated WorkoutSeriesInput series = 2;
  double avg_heart_rate = 3;
  double max_heart_rate = 4;
  double active_energy_kcal = 5;
  double recovery_impact = 6;
  bool is_verified = 7;
  // Existing stats for compounding logic
  int64 current_experience = 8;
  double current_forge_rank = 9;
}

message ScoreForgeResponse {
  int64 experience_delta = 1;
  double new_forge_rank = 2; // 1-100 normalized
  int32 power_delta = 3;
  int32 agility_delta = 4;
  int32 grit_delta = 5;
}

message ScoreCognitiveMasteryRequest {
  string user_id = 1;
  string scenario_id = 2;
  int32 response_time_ms = 3;   // Speed of decision indicates mastery
  bool was_optimal = 4;
  int32 session_duration_sec = 5;
  double current_eloquence = 6;
}

message ScoreCognitiveMasteryResponse {
  int32 cognitive_load_index = 1; // 1-100
  int32 next_review_days = 2;     // Calculated SRS interval
  double eloquence_delta = 3;
}

message ScoreNomadRequest {
  string user_id = 1;
  int32 countries_visited = 2;
  int32 verified_checkins = 3;
  int32 elite_hubs_visited = 4;
  double current_nomad_rank = 5;
}

message ScoreNomadResponse {
  double new_nomad_rank = 1; // 1-100 normalized
  int32 exploration_delta = 2;
}

message ScoreOracleRequest {
  string user_id = 1;
  double average_complexity = 2;
  double average_synthesis = 3;
  double average_foresight = 4;
  int32 unique_domains_visited = 5;
  double current_intellectual_rank = 6;
}

message ScoreOracleResponse {
  double new_intellectual_rank = 1; // 1-100 normalized
  double clout_delta = 2;
}

message ScoreZenithRequest {
  string user_id = 1;
  int32 session_duration_mins = 2;
  double focus_score = 3;
  bool is_verified = 4;
  double avg_heart_rate = 5;
  double hrv_delta = 6;
  double current_fortitude_rank = 7;
}

message ScoreZenithResponse {
  double new_fortitude_rank = 1; // 1-100 normalized
  int32 focus_minutes_delta = 2;
}

message ScoreLegacyRequest {
  string user_id = 1;
  int32 verified_assets_count = 2;
  double total_ip_valuation = 3;
  int32 unique_jurisdictions = 4;
  double current_influence_rank = 5;
}

message ScoreLegacyResponse {
  double new_influence_rank = 1; // 1-100 normalized
  double influence_delta = 2;
}

message ScoreDominionRequest {
  string user_id = 1;
  int32 verified_properties_count = 2;
  double total_portfolio_valuation = 3;
  int32 unique_regions_count = 4;
  double current_dominion_rank = 5;
}

message ScoreDominionResponse {
  double new_dominion_rank = 1; // 1-100 normalized
  double dominion_delta = 2;
}

service ScoringService {
  rpc ScoreWorkout(ScoreWorkoutRequest) returns (ScoreWorkoutResponse);
  rpc ScoreForge(ScoreForgeRequest) returns (ScoreForgeResponse);
  rpc ScoreLexicalProgress(ScoreLexicalProgressRequest) returns (ScoreLexicalProgressResponse);
  rpc ScoreCognitiveMastery(ScoreCognitiveMasteryRequest) returns (ScoreCognitiveMasteryResponse);
  rpc ScoreNomad(ScoreNomadRequest) returns (ScoreNomadResponse);
  rpc ScoreOracle(ScoreOracleRequest) returns (ScoreOracleResponse);
  rpc ScoreZenith(ScoreZenithRequest) returns (ScoreZenithResponse);
  rpc ScoreLegacy(ScoreLegacyRequest) returns (ScoreLegacyResponse);
  rpc ScoreDominion(ScoreDominionRequest) returns (ScoreDominionResponse);
  rpc ScoreMatch(ScoreMatchRequest) returns (ScoreMatchResponse);
  
  // High-Stakes Monolith Logic (Rust Offloaded)
  rpc ScoreEmpire(ScoreEmpireRequest) returns (ScoreEmpireResponse);
  rpc ApplyDecay(ApplyDecayRequest) returns (ApplyDecayResponse);
}
