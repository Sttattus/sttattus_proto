syntax = "proto3";

package sttattus.vault.v1;

option go_package = "github.com/sttattus/proto/gen/go/sttattus/vault/v1;vaultv1";

service VaultSyncService {
  // Verifies an EVM or Solana signature against a challenge.
  rpc VerifySignature(VerifySignatureRequest) returns (VerifySignatureResponse);
  
  // Fetches the total USD value of a wallet across all supported chains via Moralis.
  rpc GetWalletValue(GetWalletValueRequest) returns (GetWalletValueResponse);
}

message VerifySignatureRequest {
  string address = 1;
  string challenge = 2;
  string signature = 3;
  string chain = 4;
}

message VerifySignatureResponse {
  bool valid = 1;
}

message GetWalletValueRequest {
  string address = 1;
  string chain = 2;
}

message GetWalletValueResponse {
  double total_value_usd = 1;
  map<string, string> metadata = 2; // e.g., token breakdown
}
