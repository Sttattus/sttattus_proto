version: v2
# clean is disabled because the TS gen dir hosts a hand-written
# package.json + index.ts (so admin can consume it as a path package).
# Per-language subdirs are still recreated by each plugin run.
clean: false
plugins:
  # Go — for backend_go
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative

  # TypeScript (Connect-ES) — for admin.
  # Pinned to v1 because protoc-gen-connect-es is on v1.x; pairing it with
  # protoc-gen-es v2 emits imports from `@bufbuild/protobuf/codegenv2` that
  # the v1 protobuf package doesn't export. When connect-es v2 ships, bump
  # both pins together.
  - remote: buf.build/bufbuild/es:v1.10.0
    out: gen/ts
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es:v1.6.1
    out: gen/ts
    opt:
      - target=ts

  # Dart bindings are generated by scripts/generate-dart-grpc.sh (not buf),
  # because buf.build does not host a Dart gRPC plugin and we need both the
  # message types and the gRPC client stubs. Output lands at
  # gen/dart/lib/sttattus/... so the directory can be a path-pub package
  # consumable by every app_*/pubspec.yaml.
